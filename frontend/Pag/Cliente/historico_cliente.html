    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

    <body class="com-sidebar">

        <!-- HEADER -->
        <section class="top-header">
            <h1>Painel de Histórico</h1>
        </section>

        <!-- SIDEBAR -->
        <section class="sidebar">
            <a href="#" class="logo">
                <img src="../../img/Logo_vet.png">

            <hr>

            <nav class="menu">
                <a href="dashboard_cliente.html"><i class="fa-solid fa-home"></i> Dashboard</a>
                <a href="perfil_cliente.html"><i class="fa-solid fa-user"></i> Perfil</a>
                <a href="consultas_cliente.html"><i class="fa-solid fa-calendar"></i> Consultas</a>

                <a href="#"><i class="fa-solid fa-right-from-bracket"></i> Sair</a>

        <!-- CONTEÚDO -->
        <section class="dashboard">

            <h2>Histórico 📄</h2>

            <!-- FILTROS -->
            <section class="filtros">
                <button class="ativo">Todos</button>
                <button>Últimos 7 dias</button>
                <button>Último mês</button>
            </section>

            <!-- LISTA -->
            <section class="lista-consultas">

                <!-- CONSULTA 1 -->
                <section class="consulta historico">
                    <div class="info">
                        <p class="nome">🐾 Rex</p>
                        <p>📅 10 Março - 14:30</p>
                        <p>💉 Vacinação</p>
                        <p>👨‍⚕️ Dr. João</p>
                        <p>💰 35€</p>
                        <p class="status">Concluído</p>
                    </div>

                    <div class="acoes">
                        <button class="btn btn-detalhes">Ver</button>
                        <button class="btn btn-repetir">Repetir</button>
                    </div>
                </section>

                <!-- CONSULTA 2 -->
                <section class="consulta historico">
                    <div class="info">
                        <p class="nome">🐱 Mimi</p>
                        <p>📅 5 Março - 10:00</p>
                        <p>🩺 Check-up</p>
                        <p>👨‍⚕️ Dra. Ana</p>
                        <p>💰 25€</p>
                        <p class="status">Concluído</p>
                    </div>

                    <div class="acoes">
                        <button class="btn btn-detalhes">Ver</button>
                        <button class="btn btn-repetir">Repetir</button>
                    </div>
                </section>

            </section>

        </section>
