<!DOCTYPE html>
<html lang="pt-PT">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Perfil Cliente</title>
        
        <link rel="stylesheet" href="../../CSS/PaginaSite.css">
        <link rel="stylesheet" href="../../CSS/perfis.css"> 
        <link rel="stylesheet" href="../../CSS/css_cliente/header_cliente.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    </head>

    <body class="com-sidebar">
        <section class="top-header">
            <h1>Painel do Perfil</h1>
        </section>

        <section class="sidebar">
            <a href="#" class="logo">
                <img src="../../img/Logo_vet.png">
            </a>
            <hr>
            <nav class="menu">
                <a href="dashboard_cliente.html"><i class="fa fa-home"></i> Dashboard</a>
                <a href="perfil_cliente.html" class="active"><i class="fa fa-user"></i> Perfil</a>
                <a href="consultas_cliente.html"><i class="fa fa-calendar"></i> Consultas</a>
                <a href="historico_cliente.html"><i class="fa-solid fa-clock"></i> Histórico</a>
                <a href="definicoes_cliente.html"><i class="fa fa-cog"></i> Definições</a>
                <hr>
                <a href="#"><i class="fa fa-sign-out"></i> Sair</a>
            </nav>
        </section>
        
        <main>
            <section class="dashboard">
                <section class="grid">

                    <section class="perfil">
                        <section class="foto">
                            <img src="https://i.pravatar.cc/150" alt="foto funcionario">
                        </section>
                        <h3>João Silva</h3>
                        <p class="user">@joao</p>
                        <section class="perfil-bottom">
                            <button class="editar">Editar Perfil</button>
                            <br><small>Cliente desde 2025</small>
                        </section>
                    </section>

                    <section class="coluna-direita">

                        <section class="conta"> 
                            <h2 class="titulo-conta">Dados da Conta</h2>
                            <section class="info-grid">
                                <section class="campo">
                                    <label>Nome</label>
                                    <div class="input-icon">
                                        <i class="fa fa-user"></i>
                                        <input type="text" value="João">
                                    </div>
                                </section>
                                <section class="campo">
                                    <label>Apelido</label>
                                    <div class="input-icon">
                                        <i class="fa fa-user"></i>
                                        <input type="text" value="Silva">
                                    </div>
                                </section>
                                <section class="campo">
                                    <label>Email</label>
                                    <div class="input-icon">
                                        <i class="fa fa-envelope"></i>
                                        <input type="email" value="joao@gmail.com">
                                    </div>
                                </section>
                                <section class="campo">
                                    <label>NIF</label>
                                    <div class="input-icon">
                                        <i class="fa fa-id-card"></i>
                                        <input type="text" value="123456789">
                                    </div>
                                </section>
                                <section class="campo">
                                    <label>Telefone</label>
                                    <div class="input-icon">
                                        <i class="fa fa-phone"></i>
                                        <input type="text" value="912345678">
                                    </div>
                                </section>
                                <section class="campo">
                                    <label>Morada</label>
                                    <div class="input-icon">
                                        <i class="fa fa-location-dot"></i>
                                        <input type="text" value="Rua Exemplo, Lisboa">
                                    </div>
                                </section>
                            </section>
                        </section>

                        <section class="meus-animais">
                            <h3>Os Meus Animais</h3>
                            <div class="animais-lista">
                                <div class="animal-card">
                                    <img src="https://images.unsplash.com/photo-1583511655857-d19b40a7a54e?auto=format&fit=crop&w=150&q=80">
                                    <p>Rex</p>
                                    <small>Cão</small>
                                </div>
                                <div class="animal-card">
                                    <img src="https://images.unsplash.com/photo-1514888286974-6c03e2ca1dba?auto=format&fit=crop&w=150&q=80">
                                    <p>Mimi</p>
                                    <small>Gato</small>
                                </div>
                                <div class="animal-card adicionar">
                                    <div class="circulo-add">
                                        <i class="fa fa-plus"></i>
                                    </div>
                                    <p>Adicionar</p>
                                </div>
                            </div>
                        </section>

                        <section class="avisos">
                            <h3>Avisos</h3>
                            <p class="aviso">Consulta do seu animal marcada às 14:30</p>
                            <p class="aviso">Vacinação pendente</p>
                            <p class="aviso">Lembrete de consulta amanhã</p>
                        </section>

                    </section> 
                </section> 
            </section> 
        </main>
    </body>
</html>
