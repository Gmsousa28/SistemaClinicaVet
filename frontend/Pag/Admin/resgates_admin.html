</head>

      <img src="../../img/Logo_vet.png" alt="Logo">
    </a>

    </nav>

  <header class="header-admin">
    <h1>Resgates</h1>
    <p>Gestão de animais resgatados e parcerias</p>
  </header>

  <main class="dashboard-main">
    <h2 class="titulo-seccao">Lista de Resgates</h2>
    <div class="tabela-container">
      <table class="tabela-consultas">
        <thead>
          <tr>
            <th>Espécie / Raça</th>
            <th>Data Resgate</th>
            <th>Estado</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody id="tabelaResgates">
          </tbody>
      </table>
    </div>
  </main>

<div id="modalEdicao" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(44, 62, 80, 0.85); z-index: 1000; justify-content: center; align-items: center;">

    <div class="cartao-formulario" style="max-width: 600px; width: 100%; padding: 2.5rem; position: relative; max-height: 90vh; overflow-y: auto; background: #fff; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);">

      <button class="fechar-modal" onclick="document.getElementById('modalEdicao').style.display='none'" style="position: absolute; top: 20px; right: 20px; background: none; border: none; font-size: 1.5rem; color: #7f8c8d; cursor: pointer; transition: color 0.2s;">&times;</button>

      <h2 id="tituloEdicao" style="color: var(--cor-base-escura, #2c3e50); margin-bottom: 2rem; text-align: center;">Editar Registo de Resgate</h2>

      <form onsubmit="event.preventDefault(); salvarEdicao();">

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 1.5rem;">
          
          <div class="grupo-input">
           <label style="font-weight: bold; margin-bottom: 8px; display: block; color: var(--cor-base-escura, #2c3e50);">Espécie / Descrição:</label>
           <select id="editNome" class="input-premium" required style="width: 100%; padding: 12px 15px; border: 1px solid #ecf0f1; border-radius: 8px; background-color: #fff; outline: none; box-sizing: border-box; cursor: pointer;">
              <option value="" disabled selected>Selecione a espécie</option>
              <option value="Cão">Cão</option>
              <option value="Gato">Gato</option>
              <option value="Outros">Outros</option>
            </select>
           </div>

          <div class="grupo-input">
            <label style="font-weight: bold; margin-bottom: 8px; display: block; color: var(--cor-base-escura, #2c3e50);">Estado Atual:</label>
            <select id="editEstadoResgate" class="input-premium" style="width: 100%; padding: 12px 15px; border: 1px solid #ecf0f1; border-radius: 8px; background-color: #f8f9fa; outline: none; box-sizing: border-box;" required>
              <option value="Recolhido">Recolhido</option>
              <option value="Para Adoção">Para Adoção</option>
              <option value="Adotado">Adotado</option>
            </select>
          </div>

          <div class="grupo-input">
            <label style="font-weight: bold; margin-bottom: 8px; display: block; color: var(--cor-base-escura, #2c3e50);">Data do Resgate:</label>
            <input type="date" id="editDataResgate" class="input-premium" style="width: 100%; padding: 12px 15px; border: 1px solid #ecf0f1; border-radius: 8px; box-sizing: border-box;" required>
          </div>

        </div>

        <div style="display: flex; justify-content: flex-end; gap: 15px; border-top: 1px solid #eee; padding-top: 2rem; margin-top: 1rem;">
          <button type="button" onclick="document.getElementById('modalEdicao').style.display='none'" class="btn-cancelar" style="padding: 12px 30px; border-radius: 25px; font-weight: bold; border: 1px solid #ccc; background: transparent; cursor: pointer; color: #7f8c8d;">Cancelar</button>
          
          <button type="submit" class="btn-salvar" style="padding: 12px 30px; border-radius: 25px; font-weight: bold; display: flex; align-items: center; gap: 8px; background-color: var(--cor-principal, #2ea89c); color: white; border: none; cursor: pointer;">
            <i class="fa fa-save"></i> Salvar Registo
          </button>
        </div>

      </form>

    </div>
  </div>

  <footer>
    <p style="color: white; font-size: 0.9rem; text-align: center; padding: 20px 0;">
      Área Reservada - Clínica Miacãomigo © 2026
    </p>
  </footer>

  <script src="../../../JS/js_admin/testes_admin.js"></script>
</body>
</html>
