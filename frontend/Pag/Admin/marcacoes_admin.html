</head>

  <header class="header-admin">
    <h1>Marcações</h1>
    <p>Gestão de agenda clínica e consultas</p>
  </header>

  <main class="dashboard-main">
    <h2 class="titulo-seccao">Lista de Marcações</h2>
    <div class="tabela-container">
      <table class="tabela-consultas">
        <thead>
          <tr>
            <th>Cliente</th>
            <th>Animal</th>
            <th>Data</th>
            <th>Hora</th>
            <th>Tipo</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody id="tabelaMarcacoes"></tbody>
      </table>
    </div>
  </main>

  <div id="modalEdicao" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(44, 62, 80, 0.85); z-index: 1000; justify-content: center; align-items: center;">
    <div class="cartao-formulario" style="max-width: 650px; width: 100%; padding: 2.5rem; position: relative; max-height: 90vh; overflow-y: auto; background: #fff; border-radius: 12px;">
      
      <button class="fechar-modal" onclick="fecharModalEdicao()" style="position: absolute; top: 20px; right: 20px; background: none; border: none; font-size: 1.5rem; color: #7f8c8d; cursor: pointer;">&times;</button>

      <h2 id="tituloEdicao" style="color: #2c3e50; margin-bottom: 2rem; text-align: center;">Editar Marcação</h2>

      <form onsubmit="event.preventDefault(); salvarEdicao();">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 1.5rem;">
          
          <div class="grupo-input" style="grid-column: 1 / -1;">
            <label style="font-weight: bold; margin-bottom: 8px; display: block; color: #2c3e50;">Animal / Paciente:</label>
            <input type="text" id="editNome" class="input-premium" readonly style="background-color: #e2e8f0; width: 100%; padding: 12px 15px; border-radius: 8px; box-sizing: border-box;">
          </div>

          <div class="grupo-input" style="grid-column: 1 / -1;">
            <label style="font-weight: bold; margin-bottom: 10px; display: block; color: #2c3e50;">Selecione os Serviços (30 min cada):</label>
            <div class="container-servicos">

              <label class="botao-servico">
                <input type="checkbox" name="servico" value="30" onchange="calcularHoraFim()"> 
                <i class="fa fa-stethoscope"></i> Consulta Geral
              </label>

              <label class="botao-servico">
                <input type="checkbox" name="servico" value="30" onchange="calcularHoraFim()"> 
                <i class="fa fa-bath"></i> Banho
              </label>

              <label class="botao-servico">
                <input type="checkbox" name="servico" value="30" onchange="calcularHoraFim()"> 
                <i class="fa fa-cut"></i> Tosquia
              </label>

            </div>
          </div>

          <div class="grupo-input">
            <label style="font-weight: bold; margin-bottom: 8px; display: block; color: #2c3e50;">Data da Marcação:</label>
            <input type="date" id="editDataMarcacao" class="input-premium" style="width: 100%; padding: 12px 15px; border: 1px solid #ecf0f1; border-radius: 8px; box-sizing: border-box;">
          </div>

          <div class="grupo-input">
            <label style="font-weight: bold; margin-bottom: 8px; display: block; color: #2c3e50;">Hora Início:</label>
            <select id="editHoraMarcacao" class="input-premium" onchange="calcularHoraFim()" style="width: 100%; padding: 12px 15px; border: 1px solid #ecf0f1; border-radius: 8px; background: white;">
              <option value="" disabled selected>Escolha a hora</option>
              <option value="09:00">09:00</option>
              <option value="09:30">09:30</option>
              <option value="10:00">10:00</option>
              <option value="10:30">10:30</option>
              <option value="11:00">11:00</option>
              <option value="11:30">11:30</option>
              <option value="12:00">12:00</option>
              <option value="12:30">12:30</option>
              <option value="13:00">13:00</option>
              <option value="13:30">13:30</option>
              <option value="14:00">14:00</option>
              <option value="14:30">14:30</option>
              <option value="15:00">15:00</option>
              <option value="15:30">15:30</option>
              <option value="16:00">16:00</option>
              <option value="16:30">16:30</option>
              <option value="17:00">17:00</option>
            </select>
          </div>

          <div class="grupo-input">
            <label style="font-weight: bold; margin-bottom: 8px; display: block; color: #2ea89c;">Hora Fim (Calculada):</label>
            <input type="time" id="editHoraFim" class="input-premium" readonly style="background-color: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; width: 100%; padding: 12px 15px; border-radius: 8px; font-weight: bold;">
          </div>
        </div>

        <div style="display: flex; justify-content: flex-end; gap: 15px; border-top: 1px solid #eee; padding-top: 2rem;">
          <button type="button" onclick="fecharModalEdicao()" class="btn-cancelar" style="padding: 12px 30px; border-radius: 25px; border: 1px solid #ccc; background: none; cursor: pointer;">Cancelar</button>
          <button type="submit" class="btn-salvar" style="padding: 12px 30px; border-radius: 25px; background: #2ea89c; color: white; border: none; cursor: pointer; font-weight: bold;">
            <i class="fa fa-save"></i> Guardar
          </button>
        </div>
      </form>
    </div>
  </div>

  <footer>
    <p style="color: white; font-size: 0.9rem; text-align: center; padding: 20px 0;">Área Reservada - Clínica Miacãomigo © 2026</p>
  </footer>

  <script src="../../../JS/js_admin/testes_admin.js"></script>
</body>
</html>
