</head>

      <img src="../../img/Logo_vet.png" alt="Logo">

  <header class="header-admin">
    <h1>Faturação</h1>
    <p>Gestão de faturas e controlo de receitas</p>
  </header>

  <main class="dashboard-main">
    <h2 class="titulo-seccao">Lista de Faturas</h2>
    <div class="tabela-container">
      <table class="tabela-consultas">
        <thead>
          <tr>
            <th>Cliente</th>
            <th>Animal</th>
            <th>Serviço</th>
            <th>Valor (€)</th>
            <th>Data</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody id="tabelaFaturas">
          </tbody>
      </table>
    </div>
  </main>

<div id="modalEdicao" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(44, 62, 80, 0.8); z-index: 1000; justify-content: center; align-items: center;">

    <div class="cartao-formulario" style="max-width: 600px; width: 100%; padding: 2.5rem; position: relative; max-height: 90vh; overflow-y: auto; background: #fff; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);">

      <button class="fechar-modal" onclick="fecharModalEdicao()" style="position: absolute; top: 20px; right: 20px; background: none; border: none; font-size: 1.5rem; color: #7f8c8d; cursor: pointer; transition: color 0.2s;">&times;</button>

      <h2 id="tituloEdicao" style="color: var(--cor-base-escura, #2c3e50); margin-bottom: 2rem; text-align: center;">Editar Fatura</h2>

      <form onsubmit="event.preventDefault(); salvarEdicao();">

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 1.5rem;">
          
          <div class="grupo-input" style="grid-column: 1 / -1;">
            <label style="font-weight: bold; margin-bottom: 8px; display: block; color: var(--cor-base-escura, #2c3e50);">Cliente:</label>
            <input type="text" id="editNome" class="input-premium" readonly required>
          </div>

          <div class="grupo-input">
            <label style="font-weight: bold; margin-bottom: 8px; display: block; color: var(--cor-base-escura, #2c3e50);">Valor (€):</label>
            <input type="number" step="0.01" id="editValor" class="input-premium" placeholder="Ex: 45.50" required>
          </div>
          
          <div class="grupo-input">
            <label style="font-weight: bold; margin-bottom: 8px; display: block; color: var(--cor-base-escura, #2c3e50);">Data de Emissão:</label>
            <input type="date" id="editData" class="input-premium" required>
          </div>

        </div>

        <div style="display: flex; justify-content: flex-end; gap: 15px; border-top: 1px solid #eee; padding-top: 2rem; margin-top: 1rem;">
          <button type="button" onclick="fecharModalEdicao()" class="btn-cancelar" style="padding: 12px 30px; border-radius: 25px; font-weight: bold;">Cancelar</button>
          <button type="submit" class="btn-salvar" style="padding: 12px 30px; border-radius: 25px; font-weight: bold; display: flex; align-items: center; gap: 8px;">
            <i class="fa fa-file-invoice-dollar"></i> Atualizar Fatura
          </button>
        </div>
      </form>

    </div>
  </div>

  <footer>
    <p style="color: white; font-size: 0.9rem; text-align: center; padding: 20px 0;">Área Reservada - Clínica Miacãomigo © 2026</p>
  </footer>

  <script src="../../../JS/admin_testes.js"></script>
</body>
</html>
