<!DOCTYPE html>
<html lang="pt-PT">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Perfil do Veterinário - Clínica Miacãomigo</title>
        
        <link rel="stylesheet" href="../../CSS/PaginaSite.css">
        <link rel="stylesheet" href="../../CSS/perfis.css"> 
        <link rel="stylesheet" href="../../CSS/css_vet/header_vet.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    </head>

    <body class="com-sidebar">
        <section class="top-header">
            <h1>Painel Clínico</h1>
        </section>

        <section class="sidebar">
            <a href="#" class="logo">
                <img src="../../img/Logo_vet.png" alt="Logótipo Clínica">
            </a>
            <hr>
            <nav class="menu">
                <a href="dashboard_vet.html"><i class="fa fa-home"></i> Dashboard</a>
                <a href="perfil_vet.html" class="active"><i class="fa fa-user"></i> Perfil</a>
                <hr>
                <a href="../../Pag_principal.html"><i class="fa fa-sign-out"></i> Sair</a>
            </nav>
        </section>
        
        <main>
            <section class="dashboard">
                <section class="grid">
        
                    <section class="perfil">
                        <section class="foto">
                            <img id="perfil-foto" src="" alt="Foto do Médico">
                        </section>
                        <h3 id="perfil-nome-completo">A carregar...</h3>
                        <p id="perfil-cargo" class="user" style="color: #2ea89c; font-weight: bold;"></p>
                        
                        <section class="perfil-bottom">
                            <button class="editar" id="btn-editar-perfil">Editar Perfil</button>
                            <br><small id="perfil-data-entrada"></small>
                        </section>
                    </section>
        
                    <section class="coluna-direita">
                        <section class="conta"> 
                            <h2 class="titulo-conta">Dados Profissionais</h2>
                            <section class="info-grid">
                                
                                <section class="campo">
                                    <label>Nome</label>
                                    <div class="input-icon">
                                        <i class="fa fa-user"></i>
                                        <input type="text" id="input-nome" value="" readonly>
                                    </div>
                                </section>
                                
                                <section class="campo">
                                    <label>Morada</label>
                                    <div class="input-icon">
                                        <i class="fa fa-user"></i>
                                        <input type="text" id="input-morada" value="" readonly>
                                    </div>
                                </section>
                                
                                <section class="campo">
                                    <label>Email</label>
                                    <div class="input-icon">
                                        <i class="fa fa-envelope"></i>
                                        <input type="email" id="input-email" value="">
                                    </div>
                                </section>
                                
                                <section class="campo">
                                    <label>NIF</label>
                                    <div class="input-icon">
                                        <i class="fa fa-id-badge"></i>
                                        <input type="text" id="input-NIF" value="" readonly>
                                    </div>
                                </section>
                                
                                <section class="campo">
                                    <label>Contacto</label>
                                    <div class="input-icon">
                                        <i class="fa fa-phone"></i>
                                        <input type="text" id="input-telefone" value="">
                                    </div>
                                </section>
                                
                                <section class="campo">
                                    <label>Especialidade</label>
                                    <div class="input-icon">
                                        <i class="fa fa-stethoscope"></i>
                                        <input type="text" id="input-especialidade" value="" readonly>
                                    </div>
                                </section>
        
                            </section>
                        </section>
                    </section> 
                    
                </section> 
            </section> 
        </main>
        <script src="/JS/js_veterinario/perfil_vet.js"></script> 
    </body>
</html>
