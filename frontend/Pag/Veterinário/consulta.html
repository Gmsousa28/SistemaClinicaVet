<!DOCTYPE html>
<html lang="pt">
<head> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel da Receção - Clínica Miacãomigo</title>

    <link rel="stylesheet" href="../../CSS/consulta.css">
    <link rel="stylesheet" href="../../CSS/PaginaSite.css">
    <link rel="stylesheet" href="../../CSS/css_rececao/rececionista.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">  
</head>

<body class="com-sidebar"> 

    <!-- HEADER -->
    <header>
        <div class="header-texto">
            <h1>Painel das suas Consultas</h1> 
            <p>Olá! Bom turno de trabalho.</p>
        </div>
    </header>
        
    <!-- SIDEBAR -->
    <section class="sidebar">
        <a href="../../frontend/Pag_principal.html" class="logo">
            <img src="../../img/Logo_vet.png" alt="Logótipo Clínica Miacãomigo">
        </a>
        <hr>
        <nav class="menu">
            <a href="dashboard_vet.html" class="active"><i class="fa fa-home"></i> Dashboard</a>
            <a href="perfil_vet.html"><i class="fa fa-user"></i> Perfil</a>
            <hr>
            <a href="../../Pag_principal.html"><i class="fa fa-sign-out"></i> Sair</a> 
        </nav>
    </section>

    <!-- MAIN -->
    <main class="dashboard-main">

        <!-- POPUP -->
        <div id="popup-motivo" style="display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-color: rgba(0,0,0,0.6); z-index: 99999; align-items: center; justify-content: center;">
            <div style="background: white; padding: 2rem; border-radius: 12px; max-width: 500px; width: 90%; box-shadow: 0 10px 25px rgba(0,0,0,0.2);">
                
                <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding-bottom: 1rem; margin-bottom: 1.5rem;">
                    <h3 style="margin: 0; color: #2c3e50;">
                        <i class="fa fa-info-circle" style="color: #3498db; margin-right: 10px;"></i>
                        Motivo da Consulta
                    </h3>
                    <button id="btn-fechar-x-motivo" style="background: none; border: none; font-size: 1.2rem; cursor: pointer; color: #7f8c8d;">
                        <i class="fa fa-times"></i>
                    </button>
                </div>
        
                <p style="color: #444; line-height: 1.6; font-size: 1rem;">
                    <strong>Sintomas descritos:</strong> 
                    <span id="texto-motivo-dinamico"></span>
                </p>
            </div>
        </div>
        
        <!-- TABELA -->
        <section class="dashboard-resumo">
            <h2 class="titulo-seccao">Consultas de Hoje</h2>

            <div class="tabela-container"> 
                <table class="tabela-consultas">
                    <thead> 
                        <tr>
                            <th>Hora</th>
                            <th>Animal</th>
                            <th>Espécie</th>
                            <th>Raça</th>
                            <th>Cliente</th>
                            <th style="text-align: center;">Info</th>
                            <th style="text-align: center;">Iniciar</th> 
                        </tr>
                    </thead>

                    <!-- ✔️ IMPORTANTE: ID correto -->
                    <tbody id="corpo-tabela-consultas">
                        <!-- preenchido pelo JS -->
                    </tbody>

                </table>
            </div>
        </section>
    
    </main>

    <!-- FOOTER -->
    <footer>
        <p style="color: white; font-size: 0.9rem;">
            Área Reservada - Clínica Miacãomigo © 2026
        </p>
    </footer>

    <!-- ✔️ SCRIPT NO FIM + CAMINHO CORRETO -->
    <script src="/JS/js_veterinario/consulta.js"></script>

</body>
</html>
