<!DOCTYPE html>
<html lang="pt">
    <head> 
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Nova Marcação - Clínica Miacãomigo</title>
        
        <link rel="stylesheet" href="../../CSS/PaginaSite.css">
        <link rel="stylesheet" href="../../CSS/css_rececao/rececionista.css">
        <link rel="stylesheet" href="../../CSS/css_rececao/marcacoes_recep.css">
        <link rel="stylesheet" href="../../CSS/css_veterinario/exame.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    </head>

    <body class="com-sidebar">
        
        <header>
            <div class="header-texto">
                <h1>Prescrição de Exame</h1> 
                <p>Exame(s) a realizar</p>
            </div>
                
            <nav class="header-botoes">
                <a href="../Veterinário/dashboard_vet.html" class="button">Voltar ao Dashboard</a>
            </nav>
        </header>
         
        <section class="sidebar">
            <a href="../../frontend/Pag_principal.html" class="logo">
                <img src="../../img/Logo_vet.png" alt="Logótipo Clínica Miacãomigo">
            </a>
        </section>

        <main class="dashboard-main">

           <section class="barra-acoes-topo" style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 20px; margin-bottom: 2rem;">
                
                <h2 class="titulo-seccao" style="margin: 0; min-width: 300px;">Realizar Exame(s)</h2>

            </section>
            <section class="cartao-formulario"> 
                
                <div class="barra-passos">
                    <div class="passo ativo">
                        <div class="circulo-passo">1</div>
                        <span>Cliente e Animal</span>
                    </div>
                    <div class="linha-passo"></div>
                    <div class="passo">
                        <div class="circulo-passo">2</div>
                        <span>Exame</span>
                    </div>
                </div>
                
                <form action="/api/nova-marcacao" method="POST" class="formulario-marcacao">
                    
                    <div class="conteudo-passo" id="passo-1">
                        <h3 style="color: var(--cor-base-escura); margin-bottom: 1.5rem; text-align: center;">Identificar Cliente</h3>
                        
                        <div class="grupo-input" style="max-width: 500px; margin: 0 auto 2.5rem auto;">
                            <label for="nif_cliente">Procurar Cliente (NIF):</label>
                            <div style="position: relative;">
                                <i class="fa fa-search" style="position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #95a5a6; pointer-events: none;"></i>
                                <input type="text" id="nif_cliente" name="nif_cliente" placeholder="Introduza o NIF (Ex: 123456789)" required style="padding-left: 40px;" maxlength="9">
                            </div>
                        </div>
                        
                        <hr style="border: none; border-top: 1px solid #eee; margin: 2rem 0;">

                        <h3 style="color: var(--cor-base-escura); margin-bottom: 1.5rem; text-align: center;">Selecionar Animal</h3>
                        
                        <div class="grid-animais-selecao">
                            <p style="color: #7f8c8d; width: 100%; text-align: center; font-style: italic;">Introduza um NIF válido em cima para procurar os animais do cliente.</p>
                        </div>
                    </div> 

                    <div class="conteudo-passo" id="passo-2" style="display: none;">
                        <h3 style="color: var(--cor-base-escura); margin-bottom: 1.5rem; text-align: center;">Detalhes do Exame</h3>
                        
                        <label style="font-weight: 600; color: #333; margin-bottom: 10px; display: block;">1. Exame Pretendido (Pode escolher vários):</label>
                    
                        <div class="grid-opcoes-selecao">
                            <label class="cartao-opcao-radio">
                                <input type="checkbox" name="servico" value="consulta" class="esconder-radio">
                                <div class="conteudo-cartao-opcao">
                                    <i class="fa fa-stethoscope icon-opcao"></i>
                                    <span>Radiografia (Raio-X)</span>
                                </div>
                            </label>
                        
                            <label class="cartao-opcao-radio">
                                <input type="checkbox" name="servico" value="vacinacao" class="esconder-radio">
                                <div class="conteudo-cartao-opcao">
                                    <i class="fa fa-syringe icon-opcao"></i>
                                    <span>Hemograma Completo (Exame de Sangue)</span>
                                </div>
                            </label>
                        
                            <label class="cartao-opcao-radio">
                                <input type="checkbox" name="servico" value="banho" class="esconder-radio">
                                <div class="conteudo-cartao-opcao">
                                    <i class="fa fa-bath icon-opcao"></i>
                                    <span>Testes Rápidos (Doenças Contagiosas)</span>
                                </div>
                            </label>
                        
                            <label class="cartao-opcao-radio">
                                <input type="checkbox" name="servico" value="tosquia" class="esconder-radio">
                                <div class="conteudo-cartao-opcao">
                                    <i class="fa fa-cut icon-opcao"></i>
                                    <span>Exame Bioquímico (Perfil Renal e Hepático)</span>
                                </div>
                            </label>
                
                            <label class="cartao-opcao-radio">
                                <input type="checkbox" name="servico" value="consulta" class="esconder-radio">
                                <div class="conteudo-cartao-opcao">
                                    <i class="fa fa-stethoscope icon-opcao"></i>
                                    <span>Urinálise (Exame de Urina)</span>
                                </div>
                            </label>
                        
                            <label class="cartao-opcao-radio">
                                <input type="checkbox" name="servico" value="vacinacao" class="esconder-radio">
                                <div class="conteudo-cartao-opcao">
                                    <i class="fa fa-syringe icon-opcao"></i>
                                    <span>Exame de Fezes (Coproparasitológico)</span>
                                </div>
                            </label>
                        
                            <label class="cartao-opcao-radio">
                                <input type="checkbox" name="servico" value="banho" class="esconder-radio">
                                <div class="conteudo-cartao-opcao">
                                    <i class="fa fa-bath icon-opcao"></i>
                                    <span>Ultrassom Abdominal</span>
                                </div>
                            </label>
                        
                            <label class="cartao-opcao-radio">
                                <input type="checkbox" name="servico" value="tosquia" class="esconder-radio">
                                <div class="conteudo-cartao-opcao">
                                    <i class="fa fa-cut icon-opcao"></i>
                                    <span>Vacinas</span>
                                </div>
                            </label>
                        </div>
                    </div>
                    
                    <div class="acoes-formulario" style="margin-top: 3rem; border-top: 1px solid #eee; padding-top: 1.5rem; display: flex; justify-content: space-between;">
    
                        <button type="button" class="btn-secundario" id="btn-voltar" style="display:none;">
                            <i class="fa fa-arrow-left" style="margin-right: 8px;"></i> Recuar
                        </button>
                        
                        <div style="flex-grow: 1;"></div> 
                    
                        <button type="button" class="btn-primario" id="btn-avancar">
                            Seguinte <i class="fa fa-arrow-right" style="margin-left: 8px;"></i>
                        </button>
                    
                        <button type="submit" class="btn-primario" id="btn-confirmar" style="display:none; background-color: #27ae60;">
                            Confirmar Exame <i class="fa fa-check" style="margin-left: 8px;"></i>
                        </button>
                    
                    </div>

                </form>
            </section>
        </main>
        
        <footer>
            <p style="color: white; font-size: 0.9rem;">Área Reservada - Clínica Miacãomigo © 2026</p>
        </footer>
        
        <script src="/JS/js_veterinario/exame.js"></script>
    </body>
</html>
