<!doctype html>
<html lang="pt"> <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Iniciar Sessão - Clínica Miacãomigo</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../../CSS/PaginaSite.css">
    <link rel="stylesheet" href="../../CSS/login.css">


  </head>
  
  <body>
    <header>
      <a href="/frontend/Pag_principal.html" class="header-logo">
          <img src="../../img/Logo_vet.png" alt="Logótipo Clínica Miacãomigo">
      </a>
      <div class="header-texto">
          <h1>Clínica Miacãomigo</h1> 
          <p>Clínica de cuidados para os nossos amigos de 4 patas!</p>
      </div>
    </header>  

    <main class="login-container">
      <form>

        <div class="mb-3 text-start">
          <h1 class="titulo-login">Iniciar Login</h1>
          <label for="exampleInputEmail1" class="form-label"><em>Endereço de Email</em></label>
          <input type="email" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp">
          <div id="emailHelp" class="form-text text-light">Não partilharemos o teu email com terceiros.</div>
        </div>

        <div class="mb-3 text-start">
          <label for="exampleInputPassword1" class="form-label text-start"><em>Palavra-passe</em></label>
          <input type="password" class="form-control" id="exampleInputPassword1">
        </div>

        <div class="text-end mt-2">
          <a href="recuperar_conta.html" class="text-light small">Esqueci a minha palavra-passe</a>
        </div>
        
        <div class="mb-3 text-start form-check">
          <input type="checkbox" class="form-check-input" id="exampleCheck1">
          <label class="form-check-label" for="exampleCheck1">Lembrar de mim</label>
        </div>
        
        <div class="d-flex gap-2">
            <button type="submit" id="btnLogin" class="btn btn-primary">Continuar</button>
            <a href="criarconta.html" class="btn btn-secondary">Criar Conta</a>
           

        </div>
      </form>
    </main>

    <footer>
      <a href="https://www.facebook.com/ClinicaMiacaomigo" target="_blank" rel="noopener noreferrer">Siga-nos no Facebook</a>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
