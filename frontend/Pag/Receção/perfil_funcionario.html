<!DOCTYPE html>
<html lang="pt-PT">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Perfil Cliente</title>
        
        <link rel="stylesheet" href="../../CSS/PaginaSite.css">
        <link rel="stylesheet" href="../../CSS/perfis.css"> 
        <link rel="stylesheet" href="../../CSS/css_cliente/header_cliente.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    </head>

    <body class="com-sidebar">


        <header>
            <div class="header-texto">
                <h1>Perfil</h1> 
                <p>Perfil do Funcionário</p>
            </div>
                
            <nav class="header-botoes">
                <a href="../Receção/rececionista.html" class="button">Voltar ao Dashboard</a>
            </nav>
        </header>

        <div id="alerta-sucesso">
            <i class="fa fa-check-circle"></i> Perfil atualizado com sucesso!
        </div>
>
        <section class="sidebar">
            <a href="#" class="logo">
                <img src="../../img/Logo_vet.png">
            </a>
            <hr>
            <nav class="menu">
                <a href="rececionista.html"><i class="fa fa-home"></i> Dashboard</a>
                <a href="perfil_funcionario.html" class="active"><i class="fa fa-user"></i> Perfil</a>
                <a href="entradas.html"><i class="fa-regular fa-clock"></i> Entradas </a>
                <a href="marcacoes_recep.html"><i class="fa fa-calendar"></i> Marcações </a>
                <a href="faturacao_recep.html"><i class="fa fa-file-invoice"></i> Faturação </a>
                <a href="clientes_recep.html"><i class="fa fa-users"></i> Clientes </a>
                <a href="resg_ado.html"><i class="fa fa-paw"></i> Resgates e Adoções </a>
                <hr>
                <a href="../../Pag_principal.html"><i class="fa fa-sign-out"></i> Sair</a>
            </nav>
        </section>
        
        <main>
            <section class="dashboard">
                <section class="grid">

                    <section class="perfil">
                        <section class="foto-container">
                            <img src="../../img/imagemdefault.png" alt="Foto de perfil padrão" id="foto-perfil">
                            
                            <input type="file" id="input-foto" accept="image/*" style="display: none;">
                            
                            <label for="input-foto" class="overlay-foto">
                                <i class="fa fa-camera"></i>
                                <span>Alterar</span>
                            </label>
                        </section>
                        <h3>João Silva</h3>
                        <p class="user">@joao</p>
                        <section class="perfil-bottom">
                            <button class="editar">Editar Perfil</button>
                        </section>
                    </section>

                    <section class="coluna-principal">
                        
                        <section class="conta"> 
                            <h2 class="titulo-conta">Dados da Conta</h2>
                            <section class="info-grid">
                                <section class="campo">
                                    <label>Nome</label>
                                    <div class="input-icon"><i class="fa fa-user"></i>
                                        <input type="text" value="João">
                                    </div>
                                </section>
                                <section class="campo">
                                    <label>Apelido</label>
                                    <div class="input-icon"><i class="fa fa-user"></i>
                                        <input type="text" value="Silva">
                                    </div>
                                </section>
                                <section class="campo">
                                    <label>Email</label>
                                    <div class="input-icon"><i class="fa fa-envelope"></i>
                                        <input type="email" value="joao@gmail.com">
                                    </div>
                                </section>
                                <section class="campo">
                                    <label>NIF</label>
                                    <div class="input-icon"><i class="fa fa-id-card"></i>
                                        <input type="text" value="123456789">
                                    </div>
                                </section>
                                <section class="campo">
                                    <label>Telefone</label>
                                    <div class="input-icon"><i class="fa fa-phone"></i>
                                        <input type="text" value="912345678">
                                    </div>
                                </section>
                                <section class="campo">
                                    <label>Morada</label>
                                    <div class="input-icon"><i class="fa fa-location-dot"></i>
                                        <input type="text" value="Rua Exemplo, Lisboa">
                                    </div>
                                </section>
                            </section>
                        </section>

                    </section> 

                </section> 

            </section>
            
        </main>
        
        <footer>
            <p style="color: white; font-size: 0.9rem;">Área Reservada - Clínica Miacãomigo © 2026</p>
        </footer>

        <script src="../../../JS/cliente_perfil.js"></script>
    </body>
</html>
