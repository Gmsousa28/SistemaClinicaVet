    <body class="com-sidebar"> 
        <header>

            <div class="header-texto">
                <h1>Painel da Veterinário</h1> 
                <p>Olá! Bom turno de trabalho.</p>
            </div>

        <!-- MENU LATERAL -->
        <section class="sidebar">

            <a href="../../frontend/Pag_principal.html" class="logo">

            </a>

            <hr>
            <nav class="menu">

        <main class="dashboard-main">
            <section class="pesquisa-cliente" style="margin-top: 1rem; margin-bottom: 2.5rem;">
                <h2 class="titulo-seccao">Procurar Cliente</h2>
                <form action="/api/procurar-cliente" method="GET" class="barra-pesquisa" style="display: flex; gap: 15px;">
                    
                    <div style="position: relative; flex-grow: 1;">
                        <i class="fa fa-search" style="position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #95a5a6;"></i>
                        <input type="text" name="nif" id="pesquisa-nif" placeholder="Introduza o NIF do cliente (Ex: 123456789)" maxlength="9" pattern="\d{9}" required style="width: 100%; padding-left: 40px; box-sizing: border-box;">
                    </div>
                    
                    <button type="button" class="btn-pesquisar" onclick="abrirModalCliente()">
                        <i class="fa fa-id-card" style="margin-right: 5px;"></i> Pesquisar Dados
                    </button>
                </form>
            </section>
        <section class="dashboard-acoes">
            
            <a href="marcacoes_vet.html" class="card-acao" style="display: flex; flex-direction: column; align-items: center; text-align: center; padding: 2rem 1.5rem;">
                <i class="fa fa-calendar-plus" style="font-size: 2.8rem; color: #2ea89c; margin-bottom: 15px; transition: transform 0.3s ease;"></i>
                <h3 style="margin-bottom: 10px; color: #2c3e50;">Nova Marcação</h3>
                <p style="margin: 0; color: #7f8c8d; font-size: 0.95rem;">Agendar consulta</p>
            </a>
            
            <a href="consulta.html" class="card-acao" style="display: flex; flex-direction: column; align-items: center; text-align: center; padding: 2rem 1.5rem;">
                <i class="fa fa-paw" style="font-size: 2.8rem; color: #2ea89c; margin-bottom: 15px; transition: transform 0.3s ease;"></i>
                <h3 style="margin-bottom: 10px; color: #2c3e50;">Consultas</h3>
                <p style="margin: 0; color: #7f8c8d; font-size: 0.95rem;">Consultas Marcadas</p>  
            </a>

        </section>

        <section class="dashboard-resumo">
            <h2 class="titulo-seccao">Consultas de Hoje</h2>
            <div class="tabela-container"> 
                <table class="tabela-consultas">
                    <thead> 
                        <tr>
                            <th>Hora</th>
                            <th>Animal</th>
                            <th>Cliente</th>
                            <th>Serviço</th>
                        </tr>
                    </thead>
                    <tbody id="corpo-tabela-consultas">
                        </tbody>
                </table>
            </div>
        </section>

        <footer>
            <p style="color: white; font-size: 0.9rem;">Área Reservada - Clínica Miacãomigo © 2026</p>
        </footer>
